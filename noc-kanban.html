<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NOC Kanban — Sustentação &amp; Projetos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg-0:#0a0e17;
    --bg-1:#10151f;
    --bg-panel:#131a27;
    --bg-card:#171f2e;
    --bg-card-hover:#1c2536;
    --border:#232d40;
    --border-soft:#1b2334;
    --text-hi:#e8ecf4;
    --text-mid:#aab3c5;
    --text-low:#6b7690;
    --accent:#4f8cff;
    --accent-soft:rgba(79,140,255,.14);
    --cyan:#35c3d7;
    --sev-info:#7499FF;
    --sev-warn:#FFC859;
    --sev-high:#E97659;
    --sev-crit:#E45959;
    --good:#35d488;
    --radius:10px;
    --font-ui:'Inter',system-ui,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text-hi);font-family:var(--font-ui);height:100%;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:#26314a;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  #app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;border-bottom:1px solid var(--border-soft);
    background:linear-gradient(180deg,var(--bg-1),var(--bg-0));
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 10px var(--good);}
  .brand b{font-size:15px;letter-spacing:.3px;}
  .brand span{color:var(--text-low);font-size:12px;font-family:var(--font-mono);}
  .nav{display:flex;gap:4px;margin-left:8px;background:var(--bg-panel);padding:4px;border-radius:9px;border:1px solid var(--border-soft);}
  .nav button{
    background:transparent;border:none;color:var(--text-mid);font-family:var(--font-ui);
    font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:6px;cursor:pointer;letter-spacing:.3px;
  }
  .nav button.active{background:var(--accent);color:#fff;}
  .nav button:not(.active):hover{color:var(--text-hi);}
  .topbar .spacer{flex:1;}
  .btn{
    background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:7px;
    font-family:var(--font-ui);font-weight:600;font-size:12.5px;cursor:pointer;letter-spacing:.2px;
    display:flex;align-items:center;gap:6px;
  }
  .btn:hover{background:#3f7ce0;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-mid);}
  .btn.ghost:hover{color:var(--text-hi);border-color:#33415c;}
  .btn.danger{background:transparent;border:1px solid #4a2530;color:var(--sev-crit);}
  .btn.danger:hover{background:rgba(228,89,89,.1);}

  /* ---------- Kanban board ---------- */
  #board{flex:1;overflow-x:auto;overflow-y:hidden;padding:18px;display:flex;gap:14px;align-items:flex-start;}
  .col{
    background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:12px;
    width:290px;min-width:290px;height:100%;display:flex;flex-direction:column;
  }
  .col-head{
    padding:13px 14px 11px;display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--border-soft);flex-shrink:0;
  }
  .col-led{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .col-head h3{margin:0;font-size:11.5px;letter-spacing:1.2px;font-weight:700;color:var(--text-mid);flex:1;}
  .col-count{
    font-family:var(--font-mono);font-size:11px;color:var(--text-low);
    background:var(--bg-card);border:1px solid var(--border);padding:1px 7px;border-radius:20px;
  }
  .col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px;}
  .col-add{
    border:none;background:transparent;color:var(--text-low);font-size:12px;padding:9px 14px 12px;
    text-align:left;cursor:pointer;font-family:var(--font-ui);flex-shrink:0;
  }
  .col-add:hover{color:var(--accent);}
  .col-body.drag-over{background:rgba(79,140,255,.06);border-radius:8px;}

  /* ---------- Card ---------- */
  .card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:9px;padding:11px 12px 10px;
    cursor:grab;transition:border-color .12s, background .12s;
  }
  .card:hover{background:var(--bg-card-hover);border-color:#2c3852;}
  .card.dragging{opacity:.35;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;}
  .card-title{font-size:13px;font-weight:600;line-height:1.35;color:var(--text-hi);}
  .sev-pill{
    flex-shrink:0;font-family:var(--font-mono);font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;
  }
  .card-desc{font-size:11.5px;color:var(--text-low);margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;}
  .impact-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;}
  .impact-label{font-size:9.5px;color:var(--text-low);text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-mono);}
  .impact-dots{display:flex;gap:3px;}
  .impact-dot{width:6px;height:6px;border-radius:50%;background:#26314a;}
  .impact-dot.on{background:var(--sev-high);}
  .card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
  .avatar{
    width:19px;height:19px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
    font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
    flex-shrink:0;
  }
  .meta-name{font-size:11px;color:var(--text-mid);}
  .ticket-chip{
    font-family:var(--font-mono);font-size:10px;color:var(--cyan);background:rgba(53,195,215,.08);
    border:1px solid rgba(53,195,215,.25);padding:1px 6px;border-radius:4px;
  }
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
  .tag{font-size:9.5px;color:var(--text-low);background:var(--bg-1);border:1px solid var(--border);padding:1.5px 6px;border-radius:20px;}
  .hours-track{height:4px;border-radius:3px;background:#1c2536;overflow:hidden;margin-bottom:4px;}
  .hours-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));}
  .hours-fill.over{background:linear-gradient(90deg,var(--sev-high),var(--sev-crit));}
  .hours-text{font-family:var(--font-mono);font-size:10px;color:var(--text-low);display:flex;justify-content:space-between;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(4,6,10,.7);backdrop-filter:blur(2px);
    display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:50;overflow-y:auto;
  }
  .modal{
    background:var(--bg-1);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .modal-head{
    display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-soft);
  }
  .modal-head h2{margin:0;font-size:17px;font-weight:700;}
  .modal-head .x{background:transparent;border:none;color:var(--text-low);font-size:20px;cursor:pointer;line-height:1;}
  .modal-head .x:hover{color:var(--text-hi);}
  .modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-mid);margin-bottom:6px;letter-spacing:.2px;}
  .field input[type=text],.field input[type=number],.field textarea,.field select,.field input[type=datetime-local]{
    width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;color:var(--text-hi);
    padding:9px 11px;font-family:var(--font-ui);font-size:13px;outline:none;
  }
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:64px;line-height:1.4;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .hint{font-size:10.5px;color:var(--text-low);margin-top:4px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border-soft);}

  .sect-title{
    font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-low);
    margin:22px 0 10px;padding-top:16px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;
  }
  .apont-row{
    display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;
    background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;
  }
  .apont-row .field{margin-bottom:0;}
  .apont-row label{font-size:10px;}
  .apont-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
  .apont-item{
    background:var(--bg-card);border:1px solid var(--border-soft);border-radius:7px;padding:9px 11px;
    display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
  }
  .apont-item .who{font-size:12px;font-weight:600;}
  .apont-item .when{font-family:var(--font-mono);font-size:10px;color:var(--text-low);margin-top:2px;}
  .apont-item .desc{font-size:11.5px;color:var(--text-mid);margin-top:4px;}
  .apont-item .hrs{font-family:var(--font-mono);font-size:13px;color:var(--good);font-weight:600;white-space:nowrap;}
  .apont-item .del{background:transparent;border:none;color:var(--text-low);cursor:pointer;font-size:14px;padding:0 2px;}
  .apont-item .del:hover{color:var(--sev-crit);}
  .apont-sum{
    display:flex;justify-content:space-between;align-items:center;background:var(--bg-panel);
    border:1px solid var(--border-soft);border-radius:8px;padding:11px 13px;font-family:var(--font-mono);font-size:12px;
  }
  .apont-sum b{font-size:15px;color:var(--good);}
  .empty-note{color:var(--text-low);font-size:11.5px;padding:10px 0;text-align:center;}

  /* ---------- Dashboard ---------- */
  #dashboard{flex:1;overflow-y:auto;padding:24px 26px 60px;}
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{
    background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:12px;padding:16px 18px;
  }
  .kpi .label{font-size:10.5px;color:var(--text-low);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px;}
  .kpi .value{font-family:var(--font-mono);font-size:26px;font-weight:600;}
  .kpi .sub{font-size:11px;color:var(--text-low);margin-top:4px;}
  .kpi .value.warn{color:var(--sev-high);}
  .kpi .value.good{color:var(--good);}

  .panels{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px;}
  .panel{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:12px;padding:18px 20px;}
  .panel h4{margin:0 0 14px;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-mid);}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row .name{width:110px;font-size:11.5px;color:var(--text-mid);flex-shrink:0;}
  .bar-track{flex:1;height:16px;background:var(--bg-card);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;}
  .bar-row .num{width:34px;text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--text-low);flex-shrink:0;}

  .sev-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
  .sev-legend div{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-mid);}
  .sev-legend .sw{width:9px;height:9px;border-radius:2px;}

  table.exec{width:100%;border-collapse:collapse;font-size:12px;}
  table.exec th{
    text-align:left;color:var(--text-low);font-weight:600;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.4px;padding:0 8px 8px;border-bottom:1px solid var(--border-soft);
  }
  table.exec td{padding:9px 8px;border-bottom:1px solid var(--border-soft);}
  table.exec tr:last-child td{border-bottom:none;}
  table.exec td.tt{color:var(--text-hi);font-weight:500;}
  table.exec td.num{font-family:var(--font-mono);text-align:right;color:var(--text-mid);}

  .reset-link{color:var(--text-low);font-size:11px;background:none;border:none;cursor:pointer;text-decoration:underline;}
  .reset-link:hover{color:var(--sev-crit);}

  .loading-note{color:var(--text-low);font-size:12px;padding:30px;text-align:center;}
  @media (max-width:980px){.dash-grid{grid-template-columns:repeat(2,1fr);} .panels{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <b>NOC Kanban</b>
      <span>sustentação &amp; projetos</span>
    </div>
    <div class="nav">
      <button id="nav-board" class="active">Kanban</button>
      <button id="nav-dash">Dashboard</button>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost" id="btn-reset">Limpar dados</button>
    <button class="btn" id="btn-new-top">+ Nova tarefa</button>
  </div>

  <div id="board"></div>
  <div id="dashboard" style="display:none;"></div>

</div>

<div id="modal-root"></div>

<script>
(function(){
"use strict";

const COLUMNS = [
  {id:'BACKLOG', label:'BACKLOG', color:'#6b7690'},
  {id:'TODO', label:'TO DO', color:'#7499FF'},
  {id:'IN_PROGRESS', label:'IN PROGRESS', color:'#FFC859'},
  {id:'REVIEW', label:'REVIEW', color:'#c78bff'},
  {id:'DELIVERED', label:'DELIVERED', color:'#35c3d7'},
  {id:'DONE', label:'DONE', color:'#35d488'},
];

const PRIORITIES = [
  {id:'Baixa', color:'#7499FF'},
  {id:'Média', color:'#FFC859'},
  {id:'Alta', color:'#E97659'},
  {id:'Crítica', color:'#E45959'},
];
const IMPACTS = [
  {id:'Baixo', n:1},
  {id:'Médio', n:2},
  {id:'Alto', n:3},
  {id:'Crítico', n:4},
];

const STORAGE_KEY = 'noc-kanban-board-v1';
let board = { tasks: [] };
let dragTaskId = null;
let currentPage = 'board';

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

function initials(name){
  if(!name) return '—';
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

function priorityColor(p){ const f = PRIORITIES.find(x=>x.id===p); return f ? f.color : '#6b7690'; }
function impactN(i){ const f = IMPACTS.find(x=>x.id===i); return f ? f.n : 1; }

function loggedHours(task){
  let total = 0;
  (task.apontamentos||[]).forEach(a=>{
    if(a.start && a.end){
      const s = new Date(a.start).getTime(), e = new Date(a.end).getTime();
      if(e > s) total += (e - s) / 3600000;
    }
  });
  return total;
}

function fmtH(n){
  if(!isFinite(n)) return '0h';
  return (Math.round(n*10)/10) + 'h';
}

function fmtDT(v){
  if(!v) return '—';
  const d = new Date(v);
  if(isNaN(d.getTime())) return v;
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

/* ---------------- Persistence ---------------- */
async function loadBoard(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '<div class="loading-note">Carregando quadro…</div>';
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      board = JSON.parse(res.value);
    } else {
      board = { tasks: seedTasks() };
      await saveBoard();
    }
  }catch(err){
    board = { tasks: seedTasks() };
  }
  renderAll();
}

async function saveBoard(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(board), false);
  }catch(err){
    console.error('Falha ao salvar quadro:', err);
  }
}

function seedTasks(){
  const now = Date.now();
  const iso = (h)=> new Date(now - h*3600000).toISOString().slice(0,16);
  return [
    {
      id: uid('t'), title:'Ajustar template Zabbix dos APs', responsavel:'André Silva',
      description:'Revisar itens de disponibilidade do template de APs FortiSwitch — falsos positivos em VLAN 1100/1101.',
      priority:'Alta', impact:'Alto', ticket:'33546498', estimatedHours:4, tags:['zabbix','rede'],
      column:'IN_PROGRESS', createdAt: iso(30),
      apontamentos:[
        {id:uid('a'), responsavel:'André Silva', start:iso(6), end:iso(4.5), description:'Investigação inicial dos ifIndexes.'}
      ]
    },
    {
      id: uid('t'), title:'Corrigir dispatcher Zabbix→SMAX grupo Saúde', responsavel:'Conrado Reis',
      description:'Ajustar mapeamento de grupo solucionador para incidentes do HMC/HUC/HNSL.',
      priority:'Crítica', impact:'Crítico', ticket:'33547012', estimatedHours:6, tags:['smax','automação'],
      column:'TODO', createdAt: iso(20), apontamentos:[]
    },
    {
      id: uid('t'), title:'Hardening MariaDB — proxy o-vm-zbix-p01', responsavel:'Leandro Costa',
      description:'Eliminar login root automático e revisar debian-start no proxy Zabbix.',
      priority:'Média', impact:'Médio', ticket:'', estimatedHours:3, tags:['segurança','zabbix'],
      column:'REVIEW', createdAt: iso(50),
      apontamentos:[
        {id:uid('a'), responsavel:'Leandro Costa', start:iso(10), end:iso(8.2), description:'Aplicado hardening e testado reinício do serviço.'}
      ]
    },
    {
      id: uid('t'), title:'Dashboard Grafana — Servidores Apex/Cloud', responsavel:'Evandro Evangelista',
      description:'Publicar dashboard importável para host groups Dell (Apex) e Atos (Cloud) usando datasource Zabbix.',
      priority:'Baixa', impact:'Baixo', ticket:'33544210', estimatedHours:5, tags:['grafana','dashboard'],
      column:'DELIVERED', createdAt: iso(80),
      apontamentos:[
        {id:uid('a'), responsavel:'Evandro Evangelista', start:iso(40), end:iso(37), description:'Construção do JSON do dashboard.'},
        {id:uid('a'), responsavel:'Evandro Evangelista', start:iso(20), end:iso(18.5), description:'Ajustes finos de thresholds.'}
      ]
    },
    {
      id: uid('t'), title:'Correlação de eventos — campus CTA1', responsavel:'Diego Voltolini',
      description:'Tabelas de dependência entre Internet, DC, MAN, Access e APs para o campus PUCPR CTA1.',
      priority:'Média', impact:'Alto', ticket:'', estimatedHours:8, tags:['pucpr','documentação'],
      column:'DONE', createdAt: iso(200),
      apontamentos:[
        {id:uid('a'), responsavel:'Diego Voltolini', start:iso(100), end:iso(93), description:'Mapeamento dos 18 cenários de falha.'}
      ]
    },
    {
      id: uid('t'), title:'Analisar cobertura de automação — grupos especializados', responsavel:'',
      description:'Levantar incidentes sem automação Zabbix entre jan–jun e propor plano de ação.',
      priority:'Média', impact:'Médio', ticket:'', estimatedHours:6, tags:['roi','automação'],
      column:'BACKLOG', createdAt: iso(5), apontamentos:[]
    },
  ];
}

/* ---------------- Rendering: Board ---------------- */
function renderBoard(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  COLUMNS.forEach(col=>{
    const tasks = board.tasks.filter(t=>t.column===col.id);
    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.innerHTML = `
      <div class="col-head">
        <span class="col-led" style="background:${col.color};box-shadow:0 0 6px ${col.color}"></span>
        <h3>${col.label}</h3>
        <span class="col-count">${tasks.length}</span>
      </div>
      <div class="col-body" data-col="${col.id}"></div>
      <button class="col-add" data-col="${col.id}">+ Adicionar tarefa</button>
    `;
    const body = colEl.querySelector('.col-body');
    tasks.forEach(t=> body.appendChild(renderCard(t)));

    body.addEventListener('dragover', e=>{ e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', ()=> body.classList.remove('drag-over'));
    body.addEventListener('drop', e=>{
      e.preventDefault(); body.classList.remove('drag-over');
      if(dragTaskId){
        const task = board.tasks.find(t=>t.id===dragTaskId);
        if(task){ task.column = col.id; saveBoard(); renderBoard(); }
        dragTaskId = null;
      }
    });
    colEl.querySelector('.col-add').addEventListener('click', ()=> openTaskEditor(null, col.id));
    boardEl.appendChild(colEl);
  });
}

function renderCard(task){
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  const logged = loggedHours(task);
  const est = task.estimatedHours || 0;
  const pct = est > 0 ? Math.min(100, (logged/est)*100) : (logged>0 ? 100 : 0);
  const over = est > 0 && logged > est;
  const impN = impactN(task.impact);

  card.innerHTML = `
    <div class="card-top">
      <div class="card-title">${escapeHtml(task.title)}</div>
      <span class="sev-pill" style="color:${priorityColor(task.priority)};background:${priorityColor(task.priority)}22;border:1px solid ${priorityColor(task.priority)}55">${task.priority||'—'}</span>
    </div>
    ${task.description ? `<div class="card-desc">${escapeHtml(task.description)}</div>` : ''}
    <div class="impact-row">
      <span class="impact-label">Impacto</span>
      <span class="impact-dots">${[1,2,3,4].map(n=>`<span class="impact-dot ${n<=impN?'on':''}"></span>`).join('')}</span>
      <span class="impact-label" style="margin-left:2px;">${task.impact||'—'}</span>
    </div>
    <div class="card-meta">
      <span class="avatar">${initials(task.responsavel)}</span>
      <span class="meta-name">${task.responsavel ? escapeHtml(task.responsavel) : 'Não atribuído'}</span>
      ${task.ticket ? `<span class="ticket-chip">#${escapeHtml(task.ticket)}</span>` : ''}
    </div>
    ${task.tags && task.tags.length ? `<div class="tags">${task.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
    <div class="hours-track"><div class="hours-fill ${over?'over':''}" style="width:${pct}%"></div></div>
    <div class="hours-text"><span>${fmtH(logged)} apontadas</span><span>${fmtH(est)} estimadas</span></div>
  `;

  card.addEventListener('click', ()=> openTaskDetail(task.id));
  card.addEventListener('dragstart', ()=>{ dragTaskId = task.id; card.classList.add('dragging'); });
  card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
  return card;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- Modal: create/edit task ---------------- */
function openTaskEditor(taskId, defaultCol){
  const existing = taskId ? board.tasks.find(t=>t.id===taskId) : null;
  const root = document.getElementById('modal-root');
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <h2>${existing ? 'Editar tarefa' : 'Nova tarefa'}</h2>
        <button class="x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Título</label>
          <input type="text" id="f-title" placeholder="Ex: Ajustar template Zabbix dos APs" value="${existing?escapeAttr(existing.title):''}">
        </div>
        <div class="field">
          <label>Descrição</label>
          <textarea id="f-desc" placeholder="Detalhe o contexto, sistemas envolvidos e critério de conclusão">${existing?existing.description||'':''}</textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Responsável</label>
            <input type="text" id="f-resp" placeholder="Nome do responsável" value="${existing?escapeAttr(existing.responsavel||''):''}">
          </div>
          <div class="field">
            <label>Prioridade</label>
            <select id="f-prio">${PRIORITIES.map(p=>`<option value="${p.id}" ${existing&&existing.priority===p.id?'selected':(!existing&&p.id==='Média'?'selected':'')}>${p.id}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Impacto</label>
            <select id="f-impact">${IMPACTS.map(i=>`<option value="${i.id}" ${existing&&existing.impact===i.id?'selected':(!existing&&i.id==='Médio'?'selected':'')}>${i.id}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>Coluna</label>
            <select id="f-col">${COLUMNS.map(c=>`<option value="${c.id}" ${(existing?existing.column:defaultCol)===c.id?'selected':''}>${c.label}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field-row3">
          <div class="field">
            <label>Ticket vinculado (opcional)</label>
            <input type="text" id="f-ticket" placeholder="33546498" value="${existing?escapeAttr(existing.ticket||''):''}">
          </div>
          <div class="field">
            <label>Horas estimadas</label>
            <input type="number" min="0" step="0.5" id="f-hours" placeholder="4" value="${existing?existing.estimatedHours||'':''}">
          </div>
          <div class="field">
            <label>Tags (vírgula)</label>
            <input type="text" id="f-tags" placeholder="zabbix, rede" value="${existing?escapeAttr((existing.tags||[]).join(', ')):''}">
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="f-cancel">Cancelar</button>
        <button class="btn" id="f-save">${existing?'Salvar alterações':'Criar no Backlog'.replace('Backlog', COLUMNS.find(c=>c.id===(defaultCol||'BACKLOG')).label)}</button>
      </div>
    </div>
  `;
  root.appendChild(wrap);

  function close(){ wrap.remove(); }
  wrap.querySelector('.x').addEventListener('click', close);
  wrap.querySelector('#f-cancel').addEventListener('click', close);
  wrap.addEventListener('mousedown', e=>{ if(e.target===wrap) close(); });

  wrap.querySelector('#f-save').addEventListener('click', ()=>{
    const title = wrap.querySelector('#f-title').value.trim();
    if(!title){ wrap.querySelector('#f-title').style.borderColor = 'var(--sev-crit)'; return; }
    const tags = wrap.querySelector('#f-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
    const data = {
      title,
      description: wrap.querySelector('#f-desc').value.trim(),
      responsavel: wrap.querySelector('#f-resp').value.trim(),
      priority: wrap.querySelector('#f-prio').value,
      impact: wrap.querySelector('#f-impact').value,
      column: wrap.querySelector('#f-col').value,
      ticket: wrap.querySelector('#f-ticket').value.trim(),
      estimatedHours: parseFloat(wrap.querySelector('#f-hours').value) || 0,
      tags,
    };
    if(existing){
      Object.assign(existing, data);
    } else {
      board.tasks.push(Object.assign({id:uid('t'), createdAt:new Date().toISOString(), apontamentos:[]}, data));
    }
    saveBoard();
    renderAll();
    close();
  });
}

function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

/* ---------------- Modal: task detail + apontamentos ---------------- */
function openTaskDetail(taskId){
  const task = board.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const root = document.getElementById('modal-root');
  const wrap = document.createElement('div');
  wrap.className = 'overlay';

  function build(){
    const logged = loggedHours(task);
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head">
          <h2>${escapeHtml(task.title)}</h2>
          <button class="x">&times;</button>
        </div>
        <div class="modal-body">
          <div class="card-meta" style="margin-bottom:14px;">
            <span class="sev-pill" style="color:${priorityColor(task.priority)};background:${priorityColor(task.priority)}22;border:1px solid ${priorityColor(task.priority)}55">${task.priority}</span>
            <span class="impact-label">Impacto: ${task.impact}</span>
            ${task.ticket ? `<span class="ticket-chip">#${escapeHtml(task.ticket)}</span>` : ''}
            <span class="tag">${COLUMNS.find(c=>c.id===task.column).label}</span>
          </div>
          <div class="field"><label>Descrição</label><div style="font-size:12.5px;color:var(--text-mid);line-height:1.5;">${task.description ? escapeHtml(task.description) : '<span style="color:var(--text-low)">Sem descrição.</span>'}</div></div>
          <div class="field-row">
            <div class="field"><label>Responsável</label><div style="font-size:12.5px;">${escapeHtml(task.responsavel)||'Não atribuído'}</div></div>
            <div class="field"><label>Horas estimadas</label><div style="font-size:12.5px;font-family:var(--font-mono);">${fmtH(task.estimatedHours||0)}</div></div>
          </div>
          ${task.tags && task.tags.length ? `<div class="tags" style="margin-bottom:6px;">${task.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}

          <div class="sect-title">
            <span>Apontamentos</span>
            <span style="font-family:var(--font-mono);font-weight:400;font-size:11px;">${fmtH(logged)} lançadas</span>
          </div>

          <div class="apont-row">
            <div class="field"><label>Responsável</label><input type="text" id="a-resp" placeholder="Nome"></div>
            <div class="field"><label>Início</label><input type="datetime-local" id="a-start"></div>
            <div class="field"><label>Término</label><input type="datetime-local" id="a-end"></div>
            <button class="btn" id="a-add" style="height:37px;">Lançar</button>
          </div>
          <div class="field" style="margin-top:-4px;">
            <label>Descrição do apontamento</label>
            <input type="text" id="a-desc" placeholder="O que foi feito nesse período">
          </div>

          <div class="apont-list" id="apont-list"></div>

          <div class="apont-sum">
            <span>Total apontado / estimado</span>
            <b>${fmtH(logged)} / ${fmtH(task.estimatedHours||0)}</b>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn danger" id="t-delete">Excluir tarefa</button>
          <div style="flex:1;"></div>
          <button class="btn ghost" id="t-edit">Editar</button>
          <button class="btn ghost" id="t-close">Fechar</button>
        </div>
      </div>
    `;

    const list = wrap.querySelector('#apont-list');
    const ap = task.apontamentos || [];
    if(ap.length === 0){
      list.innerHTML = '<div class="empty-note">Nenhum apontamento registrado ainda.</div>';
    } else {
      ap.slice().sort((a,b)=> new Date(b.start||0) - new Date(a.start||0)).forEach(a=>{
        let hrs = 0;
        if(a.start && a.end){
          const s = new Date(a.start).getTime(), e = new Date(a.end).getTime();
          if(e>s) hrs = (e-s)/3600000;
        }
        const item = document.createElement('div');
        item.className = 'apont-item';
        item.innerHTML = `
          <div>
            <div class="who">${escapeHtml(a.responsavel||'Não informado')}</div>
            <div class="when">${fmtDT(a.start)} &rarr; ${a.end?fmtDT(a.end):'em andamento'}</div>
            ${a.description ? `<div class="desc">${escapeHtml(a.description)}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="hrs">${a.end ? fmtH(hrs) : '—'}</span>
            <button class="del" data-id="${a.id}">&times;</button>
          </div>
        `;
        list.appendChild(item);
      });
    }
    list.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        task.apontamentos = (task.apontamentos||[]).filter(a=>a.id!==btn.dataset.id);
        saveBoard(); build();
      });
    });

    wrap.querySelector('.x').addEventListener('click', ()=>{ wrap.remove(); renderAll(); });
    wrap.querySelector('#t-close').addEventListener('click', ()=>{ wrap.remove(); renderAll(); });
    wrap.querySelector('#t-edit').addEventListener('click', ()=>{ wrap.remove(); openTaskEditor(task.id); });
    wrap.querySelector('#t-delete').addEventListener('click', ()=>{
      if(confirm('Excluir esta tarefa e todos os apontamentos vinculados?')){
        board.tasks = board.tasks.filter(t=>t.id!==task.id);
        saveBoard(); wrap.remove(); renderAll();
      }
    });
    wrap.querySelector('#a-add').addEventListener('click', ()=>{
      const resp = wrap.querySelector('#a-resp').value.trim() || task.responsavel || '';
      const start = wrap.querySelector('#a-start').value;
      const end = wrap.querySelector('#a-end').value;
      const desc = wrap.querySelector('#a-desc').value.trim();
      if(!start){ wrap.querySelector('#a-start').style.borderColor = 'var(--sev-crit)'; return; }
      if(end && new Date(end) <= new Date(start)){ wrap.querySelector('#a-end').style.borderColor = 'var(--sev-crit)'; return; }
      task.apontamentos = task.apontamentos || [];
      task.apontamentos.push({ id: uid('a'), responsavel: resp, start, end, description: desc });
      saveBoard();
      build();
    });
  }

  build();
  wrap.addEventListener('mousedown', e=>{ if(e.target===wrap){ wrap.remove(); renderAll(); } });
  root.appendChild(wrap);
}

/* ---------------- Dashboard ---------------- */
function renderDashboard(){
  const el = document.getElementById('dashboard');
  const tasks = board.tasks;
  const totalTasks = tasks.length;
  const totalEst = tasks.reduce((s,t)=> s + (t.estimatedHours||0), 0);
  const totalLogged = tasks.reduce((s,t)=> s + loggedHours(t), 0);
  const deviation = totalEst > 0 ? ((totalLogged - totalEst) / totalEst) * 100 : 0;
  const doneCount = tasks.filter(t=>t.column==='DONE').length;

  const colCounts = COLUMNS.map(c=>({...c, count: tasks.filter(t=>t.column===c.id).length}));
  const maxColCount = Math.max(1, ...colCounts.map(c=>c.count));

  const prioCounts = PRIORITIES.map(p=>({...p, count: tasks.filter(t=>t.priority===p.id).length}));
  const totalPrio = Math.max(1, prioCounts.reduce((s,p)=>s+p.count,0));

  const byResp = {};
  tasks.forEach(t=>{
    const name = t.responsavel || 'Não atribuído';
    if(!byResp[name]) byResp[name] = {est:0, logged:0, count:0};
    byResp[name].est += t.estimatedHours||0;
    byResp[name].logged += loggedHours(t);
    byResp[name].count += 1;
  });
  const respRows = Object.entries(byResp).sort((a,b)=> b[1].logged - a[1].logged);

  const taskRows = tasks.slice().sort((a,b)=> loggedHours(b) - loggedHours(a));

  el.innerHTML = `
    <div class="dash-grid">
      <div class="kpi"><div class="label">Tarefas no quadro</div><div class="value">${totalTasks}</div><div class="sub">${doneCount} concluídas · ${totalTasks-doneCount} em curso</div></div>
      <div class="kpi"><div class="label">Horas estimadas</div><div class="value">${fmtH(totalEst)}</div><div class="sub">soma de todas as tarefas</div></div>
      <div class="kpi"><div class="label">Horas apontadas</div><div class="value good">${fmtH(totalLogged)}</div><div class="sub">via apontamentos concluídos</div></div>
      <div class="kpi"><div class="label">Desvio estimado × real</div><div class="value ${deviation>15?'warn':(deviation<0?'good':'')}">${deviation>=0?'+':''}${Math.round(deviation)}%</div><div class="sub">${deviation>=0?'acima do estimado':'abaixo do estimado'}</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <h4>Distribuição por coluna</h4>
        ${colCounts.map(c=>`
          <div class="bar-row">
            <div class="name">${c.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(c.count/maxColCount)*100}%;background:${c.color}"></div></div>
            <div class="num">${c.count}</div>
          </div>
        `).join('')}
      </div>
      <div class="panel">
        <h4>Distribuição por prioridade</h4>
        <div style="display:flex;height:16px;border-radius:4px;overflow:hidden;margin-bottom:12px;">
          ${prioCounts.map(p=> p.count>0 ? `<div style="width:${(p.count/totalPrio)*100}%;background:${p.color}"></div>` : '').join('')}
        </div>
        <div class="sev-legend">
          ${prioCounts.map(p=>`<div><span class="sw" style="background:${p.color}"></span>${p.id} (${p.count})</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:14px;">
      <h4>Horas por responsável</h4>
      ${respRows.length===0 ? '<div class="empty-note">Nenhuma tarefa cadastrada.</div>' : `
      <table class="exec">
        <thead><tr><th>Responsável</th><th style="text-align:right">Tarefas</th><th style="text-align:right">Estimado</th><th style="text-align:right">Apontado</th></tr></thead>
        <tbody>
          ${respRows.map(([name,d])=>`<tr><td class="tt">${escapeHtml(name)}</td><td class="num">${d.count}</td><td class="num">${fmtH(d.est)}</td><td class="num">${fmtH(d.logged)}</td></tr>`).join('')}
        </tbody>
      </table>`}
    </div>

    <div class="panel">
      <h4>Horas por tarefa</h4>
      ${taskRows.length===0 ? '<div class="empty-note">Nenhuma tarefa cadastrada.</div>' : `
      <table class="exec">
        <thead><tr><th>Tarefa</th><th>Coluna</th><th style="text-align:right">Estimado</th><th style="text-align:right">Apontado</th></tr></thead>
        <tbody>
          ${taskRows.map(t=>`<tr><td class="tt">${escapeHtml(t.title)}</td><td>${COLUMNS.find(c=>c.id===t.column).label}</td><td class="num">${fmtH(t.estimatedHours||0)}</td><td class="num">${fmtH(loggedHours(t))}</td></tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

function renderAll(){
  renderBoard();
  renderDashboard();
}

/* ---------------- Page nav ---------------- */
function showPage(page){
  currentPage = page;
  document.getElementById('board').style.display = page==='board' ? 'flex' : 'none';
  document.getElementById('dashboard').style.display = page==='dash' ? 'block' : 'none';
  document.getElementById('nav-board').classList.toggle('active', page==='board');
  document.getElementById('nav-dash').classList.toggle('active', page==='dash');
  if(page==='dash') renderDashboard();
}
document.getElementById('nav-board').addEventListener('click', ()=> showPage('board'));
document.getElementById('nav-dash').addEventListener('click', ()=> showPage('dash'));
document.getElementById('btn-new-top').addEventListener('click', ()=> openTaskEditor(null, 'BACKLOG'));
document.getElementById('btn-reset').addEventListener('click', ()=>{
  if(confirm('Isso apaga todas as tarefas e apontamentos salvos e recarrega os dados de exemplo. Continuar?')){
    board = { tasks: seedTasks() };
    saveBoard();
    renderAll();
  }
});

loadBoard();
})();
</script>
</body>
